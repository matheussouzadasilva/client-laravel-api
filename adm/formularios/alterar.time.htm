<!DOCTYPE html> 
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Cat&aacute;logo de Jogos</title>
        <link rel="stylesheet" type="text/css" href="../../css/layoutadm.min.css" />
        <link rel="stylesheet" href="../../css/bootstrap.min.css" />
        

        <script type="text/javascript" src="../../js/scripts.min.js"></script>
        <script src="../../js/jquery.min.js"></script>
        <script src="../../js/popper.min.js" ></script>
        <script src="../../js/bootstrap.min.js" ></script>

        <script type="text/javascript">
            document.addEventListener('DOMContentLoaded', function() {
                Util.logado();

                document.getElementById("btnAcaoVoltar").classList.add('btn-secondary');
                    document.getElementById("btnAcaoVoltar").innerHTML = "Voltar";
                    document.getElementById("btnAcaoVoltar").setAttribute("onclick", "Util.goBack('../consultas/consulta.nometime.htm')");
                
                Util.queryString();

                var codigo = location.queryString.codigo;
                
                Util.prototype.ajaxcount = 0;

                Time.carregaDivisao();
                Time.carregaCategoria();
                Time.carregaTecnico();

                function ajaxdone()
                {
                    if (Util.prototype.ajaxcount < 3) {
                      //console.log(Util.prototype.ajaxcount);  
                      setTimeout(ajaxdone,21);
                    } else {
                        Time.detalhe(codigo, true);
                    }
                }

                ajaxdone();
                
            });
        </script>


        <noscript>Seu navegador não suporta JavaScript ou mesmo foi desabilitado!</noscript>    
    </head>

    <body>
        <header>
            <div id="headerimg"></div>

            <nav class="navbar navbar-dark bg-dark navbar-expand-lg " id="menuprincipal">
                <a class="navbar-brand" href="../paginas/home.htm" onmouseover="Util.alterbgmenu()">Home</a>
                <a class="navbar-brand" href="../paginas/cadastros.htm" onmouseover="Util.alterbgmenu(1)">Cadastros</a>
                <a class="navbar-brand" href="../paginas/consultas.htm" onmouseover="Util.alterbgmenu(2)">Consultas</a>
                <a class="navbar-brand" href="../formularios/alterar.senha.htm" onmouseover="Util.alterbgmenu(3)">Alterar senha</a>
                <a class="navbar-brand" href="../paginas/autenticacao2fatores.htm" onmouseover="Util.alterbgmenu(4)">Autenticação 2 fatores</a>
                <a class="navbar-brand" href="../formularios/logout.htm" onmouseover="Util.alterbgmenu(5)">Sair</a>
            </nav>
        </header>

        <div class="container">
            <div class="col-sm-6 pull-left"> 
                <h2 class="titulo">Alterar dados da time</h2>

                <form id="frmTime" name="frmTime" class="form-horizontal">
                    <div class="form-group">
                      <label for="txtNome">Nome</label>
                      <input type="text" class="form-control" name="txtNome" id="txtNome" />
                    </div>

                    <div class="form-group">
                      <label for="txtFoto">Capa</label>
                      <input type="file" class="form-control" name="txtFoto" id="txtFoto" />
                    </div>

                    <div class="form-group">
                      <label for="txtFoto">Divis&atilde;o:</label>
                      <select class="form-control" name="cmbDivisao" id="cmbDivisao" ></select>
                    </div>

                    <div class="form-group">
                      <label for="txtFoto">Categoria</label>
                      <select class="form-control" name="cmbCategoria" id="cmbCategoria" ></select>
                    </div>

                    <div class="form-group">
                      <label for="txtFoto">Tecnico</label>
                      <select class="form-control" name="cmbTecnico" id="cmbTecnico" ></select>
                    </div>

                    </br>
                    
                    <div class="form-group">
                      <input type="hidden" name="codigo" id="codigo" value="" />

                      <button id="btnAcaoVoltar" name="btnAcaoVoltar" type="button" class="btn "></button>

                      <button id="btnAtualizar" name="btnAtualizar" type="button" class="btn btn-success" onclick="Time.atualizar(frmTime)">Alterar</button>
                      <button id="btnLimpar" name="btnLimpar" type="reset" class="btn btn-secondary">Limpar</button>
                    </div>
                </form>

                <div id="mensagem" name="mensagem"></div>
            </div>
        </div>

        <footer></footer>
    </body>
</html>
